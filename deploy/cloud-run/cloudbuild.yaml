steps:
  # 1. Docker イメージのビルド
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest'
      - .
    id: build

  # 2. Artifact Registry へ push
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}'
    id: push
    waitFor: [build]

  # 3. Cloud Run へデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --max-instances=1
      - --memory=512Mi
      - --cpu=1
      - --port=8080
      - --set-env-vars=VAULT_DIR=/vault,OB_CMD=/app/node_modules/.bin/ob,CONFIG_FILE=/app/server/data/config.json
      - --set-env-vars=GITHUB_REPO_URL=${_GITHUB_REPO_URL}
      - --update-secrets=API_KEY=obsidian-sync-api-key:latest
      - --update-secrets=GIT_SSH_KEY=obsidian-sync-git-ssh-key:latest
    id: deploy
    waitFor: [push]

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest'

substitutions:
  _REGION: asia-northeast1           # 東京リージョン
  _REPO: obsidian-sync               # Artifact Registry リポジトリ名
  _SERVICE_NAME: obsidian-sync-server
  _GITHUB_REPO_URL: git@github.com:CHANGEME/obsidian.git  # 要変更

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
